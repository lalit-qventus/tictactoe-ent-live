<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1a1a2e;
    }

    .game {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      min-width: 320px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a2e;
    }

    .status {
      font-size: 1.1rem;
      font-weight: 500;
      color: #555;
      min-height: 1.5em;
      text-align: center;
    }

    .status.win {
      color: #16a34a;
      font-weight: 700;
    }

    .status.draw {
      color: #d97706;
      font-weight: 700;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 96px);
      grid-template-rows: repeat(3, 96px);
      gap: 8px;
    }

    .cell {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 2.5rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
      user-select: none;
      color: #1a1a2e;
    }

    .cell:hover:not(.taken):not(.locked) {
      background: #eff6ff;
      border-color: #93c5fd;
      transform: scale(1.04);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.winner {
      background: #dcfce7;
      border-color: #16a34a;
      color: #15803d;
    }

    .cell[data-mark="X"] {
      color: #2563eb;
    }

    .cell[data-mark="O"] {
      color: #dc2626;
    }

    .cell.winner[data-mark="X"] {
      color: #1d4ed8;
    }

    .cell.winner[data-mark="O"] {
      color: #b91c1c;
    }

    button.restart {
      margin-top: 4px;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s;
    }

    button.restart:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    button.restart:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Tic-Tac-Toe</h1>
    <p class="status" id="status">Player X's turn</p>
    <div class="board" id="board"></div>
    <button class="restart" id="restart">Restart</button>
  </div>

  <script>
    const WIN_LINES = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6],
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');

    function checkWin(boardState) {
      for (const [a, b, c] of WIN_LINES) {
        if (
          boardState[a] !== null &&
          boardState[a] === boardState[b] &&
          boardState[a] === boardState[c]
        ) {
          return { winner: boardState[a], line: [a, b, c] };
        }
      }
      return null;
    }

    function checkDraw(boardState) {
      return boardState.every(cell => cell !== null);
    }

    function render(winResult) {
      boardEl.innerHTML = '';
      board.forEach((mark, index) => {
        const cellEl = document.createElement('div');
        cellEl.className = 'cell';
        if (mark !== null) {
          cellEl.classList.add('taken');
          cellEl.dataset.mark = mark;
          cellEl.textContent = mark;
        }
        if (gameOver) {
          cellEl.classList.add('locked');
        }
        if (winResult && winResult.line.includes(index)) {
          cellEl.classList.add('winner');
        }
        cellEl.addEventListener('click', () => handleClick(index));
        boardEl.appendChild(cellEl);
      });
    }

    function handleClick(cellIndex) {
      if (gameOver || board[cellIndex] !== null) {
        return;
      }

      board[cellIndex] = currentPlayer;

      const winResult = checkWin(board);
      if (winResult) {
        gameOver = true;
        statusEl.textContent = `Player ${winResult.winner} wins!`;
        statusEl.className = 'status win';
        render(winResult);
        return;
      }

      if (checkDraw(board)) {
        gameOver = true;
        statusEl.textContent = "It's a draw!";
        statusEl.className = 'status draw';
        render(null);
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusEl.textContent = `Player ${currentPlayer}'s turn`;
      statusEl.className = 'status';
      render(null);
    }

    function restart() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      statusEl.textContent = "Player X's turn";
      statusEl.className = 'status';
      render(null);
    }

    restartBtn.addEventListener('click', restart);

    render(null);
  </script>
</body>
</html>
